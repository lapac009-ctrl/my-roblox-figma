<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI UI Generator v2</title>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 320px; background: #0a0a0a; border-right: 1px solid #222; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .canvas { flex: 1; padding: 40px; background: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 25px 25px; overflow-y: auto; display: flex; justify-content: center; }
        
        #preview-window { 
            width: 100%; 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; 
            padding: 20px; 
            min-height: 80vh;
            backdrop-filter: blur(10px);
        }

        .btn-gen { background: var(--neon); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .btn-gen:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        .upload-area { border: 2px dashed #333; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; }
        #img-preview { width: 100%; margin-top: 10px; border-radius: 5px; display: none; }
        #loader { display: none; color: var(--neon); text-align: center; font-size: 13px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--neon); letter-spacing: 1px;">NEXUS AI</h2>
    <div class="upload-area" onclick="document.getElementById('imageInput').click()">
        <span id="upload-text">Ubaci sliku dizajna</span>
        <img id="img-preview">
    </div>
    <input type="file" id="imageInput" accept="image/*" style="display:none">
    
    <button class="btn-gen" id="genBtn" onclick="generateUI()">GENERISATI KOD</button>
    <div id="loader">AI razmišlja... Može potrajati 10-15 sekundi.</div>
    <div id="error-log" style="color: #ff4444; font-size: 12px; margin-top: 10px;"></div>
</div>

<div class="canvas">
    <div id="preview-window">
        <p id="placeholder" style="text-align: center; color: #444; margin-top: 200px;">Ovde će se pojaviti HTML elementi...</p>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyAmqdPZwG2SjfwZ4c_ErsQvN0NXoxyDDHI";

    document.getElementById('imageInput').onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ex) => {
                const img = document.getElementById('img-preview');
                img.src = ex.target.result;
                img.style.display = 'block';
                document.getElementById('upload-text').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    };

    async function generateUI() {
        const input = document.getElementById('imageInput');
        const btn = document.getElementById('genBtn');
        const loader = document.getElementById('loader');
        const errLog = document.getElementById('error-log');
        const preview = document.getElementById('preview-window');

        if (!input.files[0]) return alert("Ubaci sliku prvo!");

        btn.disabled = true;
        loader.style.display = "block";
        errLog.innerText = "";
        
        try {
            const base64Data = document.getElementById('img-preview').src.split(',')[1];
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Convert this UI screenshot into a single file HTML and CSS solution. Use modern styling, Tailwind CSS if possible, and maintain the exact layout from the image. Return ONLY code." },
                            { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            let html = data.candidates[0].content.parts[0].text;
            // Čistimo Markdown smeće
            html = html.replace(/```html/g, "").replace(/```/g, "").trim();
            
            document.getElementById('placeholder').style.display = "none";
            preview.innerHTML = html;

        } catch (err) {
            errLog.innerText = "Greška: " + err.message;
            console.error(err);
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
