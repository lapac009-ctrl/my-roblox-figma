<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to UI Element</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .upload-section {
            margin-bottom: 50px;
            padding: 20px;
            border: 2px dashed #38bdf8;
            border-radius: 15px;
            text-align: center;
        }

        #file-input {
            display: none;
        }

        .upload-btn {
            background: #38bdf8;
            color: #0f172a;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .upload-btn:hover {
            background: #7dd3fc;
            box-shadow: 0 0 15px #38bdf8;
        }

        /* Kontejner gde će se stvarati elementi */
        #container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        /* Stil za element koji se pravi od slike */
        .glass-card {
            width: 300px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .glass-card img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(56, 189, 248, 0.5);
        }

        .glass-card h3 {
            margin: 10px 0;
            font-size: 1.2rem;
            color: #38bdf8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="upload-section">
        <h2>Ubaci sliku da generišeš element</h2>
        <label for="file-input" class="upload-btn">Izaberi sliku</label>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div id="container">
        </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const container = document.getElementById('container');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(event) {
                // Kreiranje strukture elementa
                const card = document.createElement('div');
                card.className = 'glass-card';

                // Ime fajla bez ekstenzije za naslov
                const fileName = file.name.split('.')[0];

                card.innerHTML = `
                    <img src="${event.target.result}" alt="Uploaded image">
                    <h3>${fileName}</h3>
                    <p style="font-size: 0.8rem; color: #94a3b8;">Element kreiran automatski</p>
                    <button style="background: transparent; border: 1px solid #38bdf8; color: #38bdf8; padding: 5px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px;">Opcije</button>
                `;

                // Dodavanje elementa u glavni kontejner
                container.appendChild(card);
            };

            reader.readAsDataURL(file);
        });
    </script>

</body>
</html>
