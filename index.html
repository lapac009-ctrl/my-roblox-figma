<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luau Forge Ultra | Modern UI</title>
    <style>
        :root {
            --bg: #08080a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00e5ff;
            --text: #ffffff;
            --danger: #ff4d4d;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #08080a 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar / Glassmorphism */
        .sidebar {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--glass-border);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        h1 { font-size: 1.4rem; margin: 0; font-weight: 800; letter-spacing: -1px; color: var(--accent); }

        .canvas-area {
            flex-grow: 1;
            position: relative;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Moderni Elementi */
        .element {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid var(--accent);
            border-radius: 8px;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            user-select: none;
            min-width: 100px;
            min-height: 50px;
        }

        .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .element:hover .delete-btn { display: block; }

        /* Forme i Dugmad */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, select, textarea {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px;
            color: white;
            outline: none;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        textarea {
            height: 180px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            color: #00ffa2;
        }

        .emoji-picker {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .emoji-btn {
            background: transparent;
            font-size: 1.2rem;
            padding: 5px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="sidebar">
    <h1>LUA FORGE ✨</h1>
    
    <div class="control-group">
        <label>Naziv i Tekst (podržava Emoji)</label>
        <input type="text" id="elName" placeholder="Npr. Dugme 🚀" value="Dugme 🚀">
    </div>

    <div class="control-group">
        <label>Boja Elementa</label>
        <input type="color" id="elColor" value="#00e5ff">
    </div>

    <button onclick="createNewElement()">Dodaj Element</button>

    <div class="emoji-picker">
        <span class="emoji-btn" onclick="addEmoji('🔥')">🔥</span>
        <span class="emoji-btn" onclick="addEmoji('💎')">💎</span>
        <span class="emoji-btn" onclick="addEmoji('👑')">👑</span>
        <span class="emoji-btn" onclick="addEmoji('🛡️')">🛡️</span>
        <span class="emoji-btn" onclick="addEmoji('⚡')">⚡</span>
    </div>

    <hr style="width:100%; border: 0.5px solid var(--glass-border)">

    <div class="control-group">
        <label>Roblox Luau Code</label>
        <textarea id="luaOutput" readonly></textarea>
        <button onclick="copyToClipboard()" style="background: var(--glass); color: white; border: 1px solid var(--accent);">Kopiraj Kod</button>
    </div>
</div>

<div class="canvas-area" id="canvas"></div>

<script>
    const canvas = document.getElementById('canvas');
    const luaOutput = document.getElementById('luaOutput');
    const elNameInput = document.getElementById('elName');
    const elColorInput = document.getElementById('elColor');

    function addEmoji(emoji) {
        elNameInput.value += emoji;
    }

    function createNewElement() {
        const name = elNameInput.value || "Frame";
        const color = elColorInput.value;
        
        const el = document.createElement('div');
        el.className = 'element';
        el.style.left = '100px';
        el.style.top = '100px';
        el.style.backgroundColor = hexToRgba(color, 0.3);
        el.style.borderColor = color;
        el.innerHTML = `<span>${name}</span> <button class="delete-btn" onclick="this.parentElement.remove(); updateLua();">X</button>`;
        
        // Atributi za Luau
        el.dataset.luaName = name.replace(/[^a-zA-Z0-9]/g, "_"); 
        el.dataset.originalText = name;
        el.dataset.color = color;

        makeDraggable(el);
        canvas.appendChild(el);
        updateLua();
    }

    function makeDraggable(el) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        el.onmousedown = (e) => {
            if(e.target.className === 'delete-btn') return;
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = () => {
                document.onmouseup = null;
                document.onmousemove = null;
            };
            document.onmousemove = (e) => {
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
                updateLua();
            };
        };
    }

    function updateLua() {
        const elements = document.querySelectorAll('.element');
        let code = "-- Generated by Luau Forge ✨\nlocal SG = Instance.new('ScreenGui', game.Players.LocalPlayer.PlayerGui)\n\n";

        elements.forEach(el => {
            const name = el.dataset.luaName;
            const text = el.dataset.originalText;
            const color = el.dataset.color;
            const rgb = hexToRgb(color);

            code += `local ${name} = Instance.new('TextLabel')\n`;
            code += `${name}.Name = "${name}"\n`;
            code += `${name}.Text = "${text}"\n`;
            code += `${name}.Size = UDim2.new(0, ${el.offsetWidth}, 0, ${el.offsetHeight})\n`;
            code += `${name}.Position = UDim2.new(0, ${el.offsetLeft}, 0, ${el.offsetTop})\n`;
            code += `${name}.BackgroundColor3 = Color3.fromRGB(${rgb.r}, ${rgb.g}, ${rgb.b})\n`;
            code += `${name}.BackgroundTransparency = 0.5\n`;
            code += `${name}.Parent = SG\n\n`;
        });
        luaOutput.value = code;
    }

    // Helper Funkcije
    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function hexToRgb(hex) {
        return {
            r: parseInt(hex.slice(1, 3), 16),
            g: parseInt(hex.slice(3, 5), 16),
            b: parseInt(hex.slice(5, 7), 16)
        };
    }

    function copyToClipboard() {
        luaOutput.select();
        document.execCommand('copy');
        alert("Kod je kopiran u clipboard! 🚀");
    }

    updateLua();
</script>

</body>
</html>
