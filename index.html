<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ognjen's AI UI Generator</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: #050505;
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar - Kontrole */
        .sidebar {
            width: 320px;
            background: #0a0a0a;
            border-right: 1px solid #222;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }

        .sidebar h2 {
            font-size: 1.5rem;
            color: var(--neon-blue);
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Upload polje */
        .upload-box {
            border: 2px dashed #333;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-box:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
        }

        #imageInput { display: none; }

        /* Glavno dugme */
        .btn-generate {
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            transition: 0.3s;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--neon-blue);
        }

        /* Glavni Canvas */
        .canvas {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
            background-color: #050505;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #preview-window {
            width: 100%;
            max-width: 1000px;
            min-height: 600px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            position: relative;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Loader animacija */
        .loader {
            display: none;
            margin-top: 10px;
            color: var(--neon-blue);
            font-weight: bold;
            text-align: center;
            font-size: 0.9rem;
        }

        #image-preview-small {
            width: 100%;
            border-radius: 8px;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Nexus AI UI</h2>
    <p style="font-size: 0.85rem; color: #888;">Ubaci sliku (screenshot) dizajna i AI će pokušati da napravi prave HTML elemente.</p>
    
    <label class="upload-box" for="imageInput">
        <span>Klikni da ubaciš sliku</span>
        <img id="image-preview-small" src="" alt="Preview">
    </label>
    <input type="file" id="imageInput" accept="image/*">

    <button class="btn-generate" onclick="generateUI()">PRETVORI U KOD</button>
    <div id="loader" class="loader">Skeniranje dizajna...</div>
</div>

<div class="canvas">
    <div id="preview-window">
        <div id="status-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #444;">
            Čekam tvoj dizajn...
        </div>
        </div>
</div>

<script>
    const API_KEY = "AIzaSyAmqdPZwG2SjfwZ4c_ErsQvN0NXoxyDDHI"; // Tvoj ubačen ključ

    // Prikaz slike čim je izabereš
    document.getElementById('imageInput').onchange = function(evt) {
        const [file] = this.files;
        if (file) {
            const preview = document.getElementById('image-preview-small');
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            document.querySelector('.upload-box span').style.display = 'none';
        }
    }

    async function generateUI() {
        const fileInput = document.getElementById('imageInput');
        const loader = document.getElementById('loader');
        const previewWindow = document.getElementById('preview-window');
        const statusText = document.getElementById('status-text');

        if (!fileInput.files[0]) {
            alert("Brate, zaboravio si da ubaciš sliku!");
            return;
        }

        loader.style.display = "block";
        statusText.style.display = "none";
        
        const file = fileInput.files[0];
        const base64Image = await toBase64(file);

        // Prompt koji tera AI da napravi što verniju kopiju
        const prompt = "You are a professional web developer. Look at this UI screenshot and recreate it perfectly using HTML and Tailwind CSS (or standard CSS). Return ONLY the clean HTML code. Do not write explanations. Use glassmorphism and modern dark mode styling if it fits.";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image.split(',')[1] } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            let aiResponse = data.candidates[0].content.parts[0].text;
            
            // Čišćenje koda od nepotrebnih ``` oznaka
            const cleanHTML = aiResponse.replace(/```html|```/g, "").trim();
            
            // Ubacivanje gotovog koda u prozor
            previewWindow.innerHTML = cleanHTML;

        } catch (error) {
            console.error("Greška:", error);
            alert("Nešto je puklo. Proveri internet ili API limit.");
            statusText.style.display = "block";
        } finally {
            loader.style.display = "none";
        }
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
</script>

</body>
</html>
